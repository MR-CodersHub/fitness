<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SPARTAN EDGE</title>
    <link rel="icon" type="image/jpeg" href="../Asset/box img.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="inner-body">
    <div class="auth-page">
        <!-- Continuous background pulse animation -->
        <div class="auth-bg-animation"></div>

        <div class="auth-container animate-scale">
            <div class="auth-header" style="margin-bottom: 20px;">
                <div class="auth-logo" style="margin-bottom: 15px;">
                    <a href="../index.html" class="logo">SPARTAN<span>EDGE</span></a>
                </div>

                <h1 style="font-size: 2.2rem; margin-bottom: 5px;">Join the Elite</h1>
                <p style="color: var(--text-gray); font-size: 0.9rem;">Forge your path to greatness</p>
            </div>

            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="fullname">Warrior Name</label>
                    <input type="text" id="fullname" class="form-control" placeholder="Leonidas" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="warrior@edge.com" required>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                            <i class="fas fa-eye password-toggle" id="togglePassword"
                                style="top: 50%; transform: translateY(-50%);"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm</label>
                        <input type="password" id="confirm-password" class="form-control" placeholder="••••••••"
                            required>
                    </div>
                </div>

                <div style="margin-bottom: 15px; text-align: left;">
                    <label style="display: flex; align-items: flex-start; gap: 8px; cursor: pointer;">
                        <input type="checkbox" required
                            style="width: 16px; height: 16px; margin-top: 2px; accent-color: var(--primary-color);">
                        <span style="font-size: 0.75rem; text-transform: none; color: var(--text-gray);">I agree to the
                            <a href="#" style="color: var(--primary-color);">Terms</a> & <a href="#"
                                style="color: var(--primary-color);">Privacy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; height: 45px; font-size: 1.1rem;">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already a member? <a href="user-login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Form Validation for Confirm Password
        const signupForm = document.getElementById('signupForm');
        const confirmPassword = document.getElementById('confirm-password');

        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (password.value !== confirmPassword.value) {
                alert("Passwords do not match!");
                return;
            }
            const name = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;

            const userData = {
                name: name,
                email: email,
                role: 'user',
                joined: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            };

            // Save current session
            localStorage.setItem('spartan_user', JSON.stringify(userData));

            // Save to all users list for admin
            const allUsers = JSON.parse(localStorage.getItem('spartan_all_users') || '[]');
            // Check if user already exists to avoid duplicates
            if (!allUsers.find(u => u.email === email)) {
                allUsers.push(userData);
                localStorage.setItem('spartan_all_users', JSON.stringify(allUsers));
            }

            alert('Welcome Warrior! Preparing your dashboard...');
            window.location.href = 'user-dashboard.html';
        });
    </script>
</body>

</html>
