<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SPARTAN EDGE</title>
    <link rel="icon" type="image/jpeg" href="../Asset/box img.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="inner-body">
    <div class="auth-page">
        <div class="auth-bg-animation"></div>
        <div class="auth-container animate-scale">
            <!-- Vertical Sequence Wrapper -->
            <div style="display: flex; flex-direction: column; width: 100%; align-items: stretch;">

                <div class="auth-header">
                    <div class="auth-logo">
                        <a href="../index.html" class="logo">SPARTAN<span>EDGE</span></a>
                    </div>

                    <div class="warrior-face">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
                            style="width: 100px; height: 100px;">
                            <path d="M50 5 L20 20 L20 50 C20 75 50 95 50 95 C50 95 80 75 80 50 L80 20 L50 5Z"
                                fill="#D32F2F" />
                            <path d="M35 35 L65 35 L65 75 L55 75 L55 45 L45 45 L45 75 L35 75 Z" fill="#FFD700"
                                opacity="0.8" />
                            <path d="M50 5 L50 25 M30 15 L35 25 M70 15 L65 25" stroke="#fff" stroke-width="2" />
                        </svg>
                        <div class="eye left">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye right">
                            <div class="pupil"></div>
                        </div>
                    </div>

                    <h1 style="font-size: 2.5rem; margin-bottom: 5px;">Forge New Credentials</h1>
                    <p style="color: var(--text-gray); font-size: 1rem;">Set a powerful new password for your account.
                    </p>
                </div>

                <!-- Form Section -->
                <form class="auth-form" id="resetPasswordForm" style="margin-top: 20px;">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="newPassword" class="form-control" placeholder="••••••••"
                                required>
                            <i class="fas fa-eye password-toggle" id="toggleNewPassword"
                                style="top: 50%; transform: translateY(-50%);"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••"
                                required>
                            <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"
                                style="top: 50%; transform: translateY(-50%);"></i>
                        </div>
                        <div id="error-msg"
                            style="color: var(--primary-color); font-size: 0.85rem; margin-top: 8px; display: none; font-weight: 600;">
                            Passwords do not match!
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px; height: 50px;">
                        Reset Password
                    </button>
                </form>

                <div class="auth-footer" style="margin-top: 30px;">
                    <p>Wait, I remember! <a href="login.html">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Eye Tracking
        const leftEyePupil = document.querySelector('.eye.left .pupil');
        const rightEyePupil = document.querySelector('.eye.right .pupil');

        document.addEventListener('mousemove', (e) => {
            const movePupil = (pupil, eyeX, eyeY) => {
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = 4;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            };

            const leftRect = leftEyePupil.parentElement.getBoundingClientRect();
            const rightRect = rightEyePupil.parentElement.getBoundingClientRect();

            movePupil(leftEyePupil, leftRect.left + leftRect.width / 2, leftRect.top + leftRect.height / 2);
            movePupil(rightEyePupil, rightRect.left + rightRect.width / 2, rightRect.top + rightRect.height / 2);
        });

        // Toggle Password Visibility
        const setupToggle = (btnId, inputId) => {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            btn.addEventListener('click', () => {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                btn.classList.toggle('fa-eye-slash');
            });
        };

        setupToggle('toggleNewPassword', 'newPassword');
        setupToggle('toggleConfirmPassword', 'confirmPassword');

        // Handle Reset Submission
        document.getElementById('resetPasswordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('error-msg');

            if (newPass !== confirmPass) {
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';

            // Mock Success Message
            const container = document.querySelector('.auth-container');
            container.innerHTML = `
                <div class="auth-header">
                    <div class="auth-logo">
                        <a href="../index.html" class="logo">SPARTAN<span>EDGE</span></a>
                    </div>
                    <div style="font-size: 4rem; color: #4CAF50; margin: 20px 0;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h1 style="font-size: 2.2rem;">Victory!</h1>
                    <p style="color: var(--text-gray); margin-top: 10px;">Your password has been successfully reset. Log in with your new credentials.</p>
                </div>
                <a href="login.html" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Return to Login</a>
            `;
        });
    </script>
</body>

</html>
