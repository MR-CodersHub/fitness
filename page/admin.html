<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | SPARTAN EDGE</title>
    <link rel="icon" type="image/jpeg" href="../Asset/box img.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-width: 260px;
        }

        body {
            background-color: #050505;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #0a0a0a;
            position: fixed;
            left: 0;
            top: 0;
            padding: 40px 20px;
            border-right: 1px solid rgba(255, 62, 62, 0.1);
            z-index: 100;
        }

        .sidebar-logo {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 50px;
            text-align: center;
        }

        .sidebar-logo span {
            color: var(--primary-color);
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 15px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 10px;
            color: var(--text-gray);
            font-family: var(--font-heading);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 62, 62, 0.1);
            color: var(--primary-color);
        }

        /* Main Content */
        .admin-main {
            margin-left: var(--sidebar-width);
            padding: 40px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Stats Grid */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid var(--primary-color);
        }

        .stat-card h4 {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-family: var(--font-heading);
            color: #fff;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-gray);
            padding: 15px 30px;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary-color);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
        }

        /* Table */
        .table-container {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th,
        .admin-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #1a1a1a;
        }

        .admin-table th {
            color: var(--primary-color);
            font-family: var(--font-heading);
            text-transform: uppercase;
            font-size: 1rem;
        }

        .admin-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-pill {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(255, 62, 62, 0.1);
            color: var(--primary-color);
        }

        @media (max-width: 992px) {
            .sidebar {
                display: none;
            }

            .admin-main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">SPARTAN<span>ADMIN</span></div>
        <ul class="sidebar-nav">
            <li><a href="../index.html" class="sidebar-link"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#" class="sidebar-link active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li style="margin-top: 50px;">
                <a href="../index.html" class="sidebar-link" onclick="localStorage.removeItem('spartan_user')">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </li>
        </ul>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <div>
                <h1 style="font-family: var(--font-heading); font-size: 3rem;">COMMAND CENTER</h1>
                <p style="color: var(--text-gray);">Manage your warriors and operations.</p>
            </div>
            <div style="text-align: right;">
                <div id="currentTime"
                    style="color: var(--primary-color); font-family: var(--font-heading); font-size: 1.5rem;"></div>
                <div style="color: var(--text-gray); font-size: 0.9rem;">Live Feed Active</div>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <h4>Registered Warriors</h4>
                <div class="number" id="totalUsersNum">0</div>
            </div>
            <div class="stat-card">
                <h4>Active Bookings</h4>
                <div class="number" id="totalBookingsNum">0</div>
            </div>
            <div class="stat-card">
                <h4>System Health</h4>
                <div class="number" style="color: #4CAF50;">100%</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="usersTab">Customers / Users</button>
            <button class="tab-btn" id="bookingsTab">Recent Bookings</button>
        </div>

        <div class="table-container">
            <table class="admin-table" id="dataTable">
                <thead id="tableHead">
                    <!-- Dynamic -->
                </thead>
                <tbody id="tableBody">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usersTab = document.getElementById('usersTab');
            const bookingsTab = document.getElementById('bookingsTab');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const totalUsersNum = document.getElementById('totalUsersNum');
            const totalBookingsNum = document.getElementById('totalBookingsNum');

            // Set Time
            setInterval(() => {
                document.getElementById('currentTime').textContent = new Date().toLocaleTimeString();
            }, 1000);

            const loadData = () => {
                const users = JSON.parse(localStorage.getItem('spartan_all_users') || '[]');
                const bookings = JSON.parse(localStorage.getItem('spartan_bookings') || '[]');

                totalUsersNum.textContent = users.length;
                totalBookingsNum.textContent = bookings.length;

                return { users, bookings };
            };

            const showUsers = () => {
                const { users } = loadData();
                usersTab.classList.add('active');
                bookingsTab.classList.remove('active');

                tableHead.innerHTML = `
                    <tr>
                        <th>Warrior Name</th>
                        <th>Email Address</th>
                        <th>Joined Date</th>
                        <th>Status</th>
                    </tr>
                `;

                if (users.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--text-gray);">No warriors found in database.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = users.map(u => `
                    <tr>
                        <td style="font-weight: 500;">${u.name}</td>
                        <td>${u.email}</td>
                        <td>${u.joined}</td>
                        <td><span class="status-pill" style="background: rgba(76, 175, 80, 0.1); color: #4CAF50;">Active</span></td>
                    </tr>
                `).join('');
            };

            const showBookings = () => {
                const { bookings } = loadData();
                bookingsTab.classList.add('active');
                usersTab.classList.remove('active');

                tableHead.innerHTML = `
                    <tr>
                        <th>Customer</th>
                        <th>Program</th>
                        <th>Date & Time</th>
                        <th>Status</th>
                    </tr>
                `;

                if (bookings.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--text-gray);">No bookings found in database.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = bookings.map(b => `
                    <tr>
                        <td style="font-weight: 500;">${b.name || 'Anonymous'}<br><small style="color:var(--text-gray); font-weight: normal;">${b.email}</small></td>
                        <td>${b.program}</td>
                        <td>${b.date} at ${b.time}</td>
                        <td><span class="status-pill">${b.status || 'Confirmed'}</span></td>
                    </tr>
                `).join('');
            };

            usersTab.addEventListener('click', showUsers);
            bookingsTab.addEventListener('click', showBookings);

            // Initial view
            showUsers();
        });
    </script>
</body>

</html>
