<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SPARTAN EDGE</title>
    <link rel="icon" type="image/jpeg" href="../Asset/box img.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="inner-body">
    <div class="auth-page">
        <div class="auth-bg-animation"></div>
        <div class="auth-container animate-scale">
            <div class="auth-header" style="margin-bottom: 20px;">
                <div class="auth-logo" style="margin-bottom: 15px;">
                    <a href="../index.html" class="logo">SPARTAN<span>EDGE</span></a>
                </div>

                <!-- Compact Warrior Face -->
                <div class="warrior-face">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 5 L20 20 L20 50 C20 75 50 95 50 95 C50 95 80 75 80 50 L80 20 L50 5Z"
                            fill="#D32F2F" />
                        <path d="M35 35 L65 35 L65 75 L55 75 L55 45 L45 45 L45 75 L35 75 Z" fill="#FFD700"
                            opacity="0.8" />
                        <path d="M50 5 L50 25 M30 15 L35 25 M70 15 L65 25" stroke="#fff" stroke-width="2" />
                    </svg>
                    <div class="eye left">
                        <div class="pupil"></div>
                    </div>
                    <div class="eye right">
                        <div class="pupil"></div>
                    </div>
                </div>

                <h1 style="font-size: 2.2rem; margin-bottom: 5px;">Access Your Power</h1>
                <p style="color: var(--text-gray); font-size: 0.9rem;">Enter the arena to track your progress.</p>
            </div>

            <div class="auth-selection"
                style="display: flex; flex-direction: column; gap: 20px; width: 100%; margin-top: 30px;">
                <a href="user-login.html" class="btn btn-primary selection-btn"
                    style="width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; text-decoration: none;">
                    <i class="fas fa-user-shield" style="margin-right: 15px;"></i> USER LOGIN
                </a>
                <a href="admin-login.html" class="btn btn-secondary selection-btn"
                    style="width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; text-decoration: none; border: 2px solid var(--primary-color); background: transparent; color: var(--primary-color);">
                    <i class="fas fa-user-lock" style="margin-right: 15px;"></i> ADMIN LOGIN
                </a>
            </div>

            <div class="auth-footer" style="margin-top: 40px;">
                <p>New to the corps? <a href="signup.html">Create Account</a></p>
            </div>
        </div>
    </div>

    <!-- Eye Tracking Logic -->
    <script>
        const leftEyePupil = document.querySelector('.eye.left .pupil');
        const rightEyePupil = document.querySelector('.eye.right .pupil');

        document.addEventListener('mousemove', (e) => {
            const movePupil = (pupil, eyeX, eyeY) => {
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = 4; // Max movement distance
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            };

            const leftRect = leftEyePupil.parentElement.getBoundingClientRect();
            const rightRect = rightEyePupil.parentElement.getBoundingClientRect();

            movePupil(leftEyePupil, leftRect.left + leftRect.width / 2, leftRect.top + leftRect.height / 2);
            movePupil(rightEyePupil, rightRect.left + rightRect.width / 2, rightRect.top + rightRect.height / 2);
        });
    </script>
</body>

</html>
