<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SPARTAN EDGE</title>
    <link rel="icon" type="image/jpeg" href="../Asset/box img.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="inner-body">
    <div class="auth-page">
        <div class="auth-bg-animation"></div>
        <div class="auth-container animate-scale">
            <div class="auth-header">
                <div class="auth-logo">
                    <a href="../index.html" class="logo">SPARTAN<span>EDGE</span></a>
                </div>

                <div class="warrior-face">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 5 L20 20 L20 50 C20 75 50 95 50 95 C50 95 80 75 80 50 L80 20 L50 5Z"
                            fill="#D32F2F" />
                        <path d="M35 35 L65 35 L65 75 L55 75 L55 45 L45 45 L45 75 L35 75 Z" fill="#FFD700"
                            opacity="0.8" />
                        <path d="M50 5 L50 25 M30 15 L35 25 M70 15 L65 25" stroke="#fff" stroke-width="2" />
                    </svg>
                    <div class="eye left">
                        <div class="pupil"></div>
                    </div>
                    <div class="eye right">
                        <div class="pupil"></div>
                    </div>
                </div>

                <h1 style="font-size: 2.2rem;">Recover Your Strength</h1>
                <p style="color: var(--text-gray); margin-top: 10px;">Enter your email to receive recovery instructions.
                </p>
            </div>

            <form class="auth-form" id="forgotPasswordForm" style="margin-top: 30px;">
                <div class="form-group">
                    <label for="email">Warrior Email</label>
                    <input type="email" id="email" class="form-control" placeholder="warrior@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Recovery Link</button>
            </form>

            <div class="auth-footer">
                <p>Remembered? <a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script>
        // Eye Tracking
        const leftEyePupil = document.querySelector('.eye.left .pupil');
        const rightEyePupil = document.querySelector('.eye.right .pupil');

        document.addEventListener('mousemove', (e) => {
            const movePupil = (pupil, eyeX, eyeY) => {
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = 4;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            };

            const leftRect = leftEyePupil.parentElement.getBoundingClientRect();
            const rightRect = rightEyePupil.parentElement.getBoundingClientRect();

            movePupil(leftEyePupil, leftRect.left + leftRect.width / 2, leftRect.top + leftRect.height / 2);
            movePupil(rightEyePupil, rightRect.left + rightRect.width / 2, rightRect.top + rightRect.height / 2);
        });

        // Handle Forgot Password
        document.getElementById('forgotPasswordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Mocking success
            alert('A recovery link has been sent to ' + email + '. (Redirecting to Reset page for simulation)');
            window.location.href = 'reset-password.html';
        });
    </script>
</body>

</html>
