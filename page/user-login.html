<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - SPARTAN EDGE</title>
    <link rel="icon" type="image/jpeg" href="../Asset/box img.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="inner-body">
    <div class="auth-page">
        <div class="auth-bg-animation"></div>
        <div class="auth-container animate-scale">
            <div class="auth-header" style="margin-bottom: 20px;">
                <div class="auth-logo" style="margin-bottom: 15px;">
                    <a href="../index.html" class="logo">SPARTAN<span>EDGE</span></a>
                </div>

                <!-- Compact Warrior Face -->
                <div class="warrior-face">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 5 L20 20 L20 50 C20 75 50 95 50 95 C50 95 80 75 80 50 L80 20 L50 5Z"
                            fill="#D32F2F" />
                        <path d="M35 35 L65 35 L65 75 L55 75 L55 45 L45 45 L45 75 L35 75 Z" fill="#FFD700"
                            opacity="0.8" />
                        <path d="M50 5 L50 25 M30 15 L35 25 M70 15 L65 25" stroke="#fff" stroke-width="2" />
                    </svg>
                    <div class="eye left">
                        <div class="pupil"></div>
                    </div>
                    <div class="eye right">
                        <div class="pupil"></div>
                    </div>
                </div>

                <h1 style="font-size: 2.2rem; margin-bottom: 5px;">Warrior Login</h1>
                <p style="color: var(--text-gray); font-size: 0.9rem;">Access your dashboard and training plan.</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Warrior ID (Email)</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Secret Credential</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>

                <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; height: 50px; font-size: 1.1rem; margin-top: 5px;">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Not a warrior yet? <a href="signup.html">Create Account</a></p>
                <p style="margin-top: 10px;"><a href="login.html" style="color: var(--text-gray); font-size: 0.8rem;"><i
                            class="fas fa-chevron-left"></i> Back to selection</a></p>
            </div>
        </div>
    </div>

    <!-- Eye Tracking Logic -->
    <script>
        const leftEyePupil = document.querySelector('.eye.left .pupil');
        const rightEyePupil = document.querySelector('.eye.right .pupil');

        document.addEventListener('mousemove', (e) => {
            const movePupil = (pupil, eyeX, eyeY) => {
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = 4; // Max movement distance
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            };

            const leftRect = leftEyePupil.parentElement.getBoundingClientRect();
            const rightRect = rightEyePupil.parentElement.getBoundingClientRect();

            movePupil(leftEyePupil, leftRect.left + leftRect.width / 2, leftRect.top + leftRect.height / 2);
            movePupil(rightEyePupil, rightRect.left + rightRect.width / 2, rightRect.top + rightRect.height / 2);
        });

        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // In a real app, you'd validate credentials here.
            // For this demo, we'll accept any user login that isn't the admin one.

            const userData = {
                name: email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1),
                email: email,
                role: 'user',
                joined: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            };

            localStorage.setItem('spartan_user', JSON.stringify(userData));

            // Save to all users list for admin if not exists
            const allUsers = JSON.parse(localStorage.getItem('spartan_all_users') || '[]');
            if (!allUsers.find(u => u.email === email)) {
                allUsers.push(userData);
                localStorage.setItem('spartan_all_users', JSON.stringify(allUsers));
            }

            window.location.href = 'user-dashboard.html';
        });
    </script>
</body>

</html>
